[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[build.buildArgs]
USE_CUDA = "false"
USE_OLLAMA = "false"
USE_SLIM = "true"

[deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 300

[[mounts]]
mountPath = "/app/backend/data"
